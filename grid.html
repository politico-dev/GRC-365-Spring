<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Grid Layout</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="script.js"></script>
        <style>
            body {
                background: white-smoke;
            } #container {
                width: 800px;
                height: 800px;
                background: white;
                border: 1px solid dimgray;
                margin: 24px auto;
                display: grid;
                grid-template: 400px 400px / 400px 400px;
            } #container div {
                font: 72pt/1.4em Candara;
            } #container div:nth-child(1) {
                background: url(orangecat.jpg);
                background-position: center;
                background-size: cover;
            } #container div {
                font: 72pt/1.4em Candara;
            } #container div:nth-child(2) {
                background: url(siamesecat.jpg);
                background-position: center;
                background-size: cover;
                grid-area: 1/2/3/3;
            } #container div {
                font: 72pt/1.4em Candara;
            } #container div:nth-child(3) {
                background: url(whitecat.jpg);
                background-position: center;
                background-size: cover;
            } #container div {
                font: 72pt/1.4em Candara;
            } #container div:nth-child(4) {
                background: url(lilypads.jpg);
                background-position: center;
                background-size: cover;
                grid-area: 4/1/3/3;
        </style>
    </head>
    <body>
        <div id="container">
            <div></div>
            <div></div>
            <div></div>
            <div>.</div>
        </div>
    </body>
</html>
